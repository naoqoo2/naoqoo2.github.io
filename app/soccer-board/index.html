<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer Board</title>
<link rel="manifest" href="manifest.json">
<style>
html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#222;color:#eee;display:flex;flex-direction:column;align-items:center}
#board{flex:1;width:100%;display:flex;justify-content:center;align-items:center;position:relative}
#field{position:relative;background:#060;aspect-ratio:105/68;width:100%;max-height:100%;border:4px solid #fff;box-sizing:border-box}
#field svg{position:absolute;top:0;left:0;width:100%;height:100%}
.token{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;touch-action:none}
.player{width:32px;height:32px;border-radius:50%;color:#fff;font-weight:bold;display:flex;justify-content:center;align-items:center;font-size:12px}
.player.red{background:#e44}
.player.blue{background:#36f}
.player.yellow{background:#fc3;color:#000}
.player.green{background:#3b3}
.player.ball{background:#fff;background-image:
  radial-gradient(circle at 30% 30%,#000 0 12%,transparent 13%),
  radial-gradient(circle at 70% 30%,#000 0 12%,transparent 13%),
  radial-gradient(circle at 30% 70%,#000 0 12%,transparent 13%),
  radial-gradient(circle at 70% 70%,#000 0 12%,transparent 13%),
  radial-gradient(circle at center,#000 0 20%,#fff 21% 100%);
background-size:100% 100%;color:#000}
.player .name{font-size:10px;margin-top:2px;white-space:nowrap}
#ball{width:32px;height:32px;border-radius:50%}
#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center}
#modal.hidden{display:none}
#modal .box{background:#333;padding:20px;border-radius:8px;display:flex;flex-direction:column;gap:8px;min-width:200px}
#modal .colors{display:flex;gap:8px}
#modal .color-option{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
#modal .color-option.selected{border-color:#fff}
@media (orientation:landscape){
  #field{height:100%;width:auto}
}
@media (orientation:portrait){
  #field{width:100%;height:auto}
}
</style>
</head>
<body>
<div id="board">
  <div id="field">
    <svg viewBox="0 0 105 68" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="105" height="68" fill="none" stroke="#fff" stroke-width="0.5"/>
      <line x1="52.5" y1="0" x2="52.5" y2="68" stroke="#fff" stroke-width="0.5"/>
      <circle cx="52.5" cy="34" r="9.15" fill="none" stroke="#fff" stroke-width="0.5"/>
      <rect x="0" y="13.84" width="16.5" height="40.32" fill="none" stroke="#fff" stroke-width="0.5"/>
      <rect x="88.5" y="13.84" width="16.5" height="40.32" fill="none" stroke="#fff" stroke-width="0.5"/>
      <rect x="0" y="24.1" width="5.5" height="19.8" fill="none" stroke="#fff" stroke-width="0.5"/>
      <rect x="99.5" y="24.1" width="5.5" height="19.8" fill="none" stroke="#fff" stroke-width="0.5"/>
      <circle cx="11" cy="34" r="0.5" fill="#fff"/>
      <circle cx="94" cy="34" r="0.5" fill="#fff"/>
    </svg>
  </div>
</div>

<div id="modal" class="hidden">
  <div class="box">
    <input id="m-name" type="text" placeholder="Name">
    <input id="m-number" type="number" placeholder="No">
    <div class="colors">
      <div class="color-option player red" data-color="red"></div>
      <div class="color-option player blue" data-color="blue"></div>
      <div class="color-option player yellow" data-color="yellow"></div>
      <div class="color-option player green" data-color="green"></div>
      <div class="color-option player ball" data-color="ball"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="delete-btn">Delete</button>
      <button id="cancel-btn" type="button">Cancel</button>
      <button id="save-btn" type="button">Save</button>
    </div>
  </div>
</div>
<script src="js/board.js"></script>
</body>
</html>
